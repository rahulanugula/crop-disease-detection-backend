spring.application.name=backend
server.port=8080

# Database Configuration
# Use H2 for local, PostgreSQL for production (overridden by env vars)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:cropdb}
spring.datasource.driverClassName=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}
spring.jpa.database-platform=${SPRING_JPA_DIALECT:org.hibernate.dialect.H2Dialect}

# Enable H2 console only for local
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:true}
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# Hibernate settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# JWT settings
jwt.secret=bXlfc3VwZXJfc2VjcmV0X2tleV90aGF0X211c3RfYmVfbG9uZ19lbm91Z2hfZm9yX2hzMjU2X2VuY3J5cHRpb24xMjM0NQ==
jwt.expiration=86400000

# File Upload sizes
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Production Settings
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}
ml.api.url=${ML_API_URL:http://localhost:5000/predict}
